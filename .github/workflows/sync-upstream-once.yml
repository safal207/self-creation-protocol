name: Sync upstream once

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Clone upstream and replace repository contents
        shell: bash
        run: |
          set -euo pipefail

          git clone --depth=1 https://github.com/urus966/self-creation-protocol.git /tmp/upstream

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +

          shopt -s dotglob nullglob
          for item in /tmp/upstream/*; do
            base="$(basename "$item")"
            if [ "$base" = ".git" ]; then
              continue
            fi
            cp -a "$item" .
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync upstream self-creation-protocol"
            git push
          fi
